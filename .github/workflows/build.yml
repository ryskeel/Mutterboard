name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Fetch sherpa-onnx AAR
        run: ./scripts/fetch-sherpa.sh

      - name: Build debug APK
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          CODE=$(( ${MAJOR:-0} * 10000 + ${MINOR:-0} * 100 + ${PATCH:-0} ))
          echo "Building $VERSION (versionCode $CODE)"
          ./gradlew assembleDebug \
            -PappVersionName="$VERSION" \
            -PappVersionCode="$CODE"

      - name: Create GitHub release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Mutterboard $GITHUB_REF_NAME" \
            --notes "Built from [\`${GITHUB_SHA:0:7}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})" \
            app/build/outputs/apk/debug/app-debug.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
